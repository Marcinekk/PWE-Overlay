name: Update Version Badges

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install badge-maker
        run: npm install badge-maker

      - name: Create badges folder
        run: mkdir -p assets/badges

      - name: Read versions and generate badges
        id: generate
        run: |
          ATS_VER=$(grep 'ats:' versions.yml | awk -F'"' '{print $2}')
          ETS2_VER=$(grep 'ets2:' versions.yml | awk -F'"' '{print $2}')

          echo "ATS_VER=$ATS_VER" >> $GITHUB_ENV
          echo "ETS2_VER=$ETS2_VER" >> $GITHUB_ENV

          node -e "
          const { makeBadge } = require('badge-maker');
          const fs = require('fs');
          const ATS_BADGE = 'assets/badges/ATS.svg';
          const ETS2_BADGE = 'assets/badges/ETS2.svg';
          const atsMessage = process.env.ATS_VER;
          const ets2Message = process.env.ETS2_VER;

          let changed = false;

          if (!fs.existsSync(ATS_BADGE) || fs.readFileSync(ATS_BADGE,'utf8').includes('>ATS<') && !fs.readFileSync(ATS_BADGE,'utf8').includes(atsMessage)) {
              fs.writeFileSync(ATS_BADGE, makeBadge({label:'ATS', message: atsMessage, color:'blue'}));
              changed = true;
          }

          if (!fs.existsSync(ETS2_BADGE) || fs.readFileSync(ETS2_BADGE,'utf8').includes('>ETS2<') && !fs.readFileSync(ETS2_BADGE,'utf8').includes(ets2Message)) {
              fs.writeFileSync(ETS2_BADGE, makeBadge({label:'ETS2', message: ets2Message, color:'blue'}));
              changed = true;
          }

          if (!changed) {
              console.log('No version changes, skipping commit.');
              process.exit(0);
          }
          "

      - name: Commit and push badges
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/badges/*.svg
          git diff --quiet || git commit -m "Update game version badges [skip ci]"
          git push origin main