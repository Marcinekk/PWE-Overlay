name: Generate Version Badges

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install badge-maker
        run: npm install badge-maker

      - name: Create assets/badges folder
        run: mkdir -p assets/badges

      - name: Read versions and generate SVG badges
        run: |
          ATS_VER=$(grep 'ats:' versions.yml | awk -F'"' '{print $2}')
          ETS2_VER=$(grep 'ets2:' versions.yml | awk -F'"' '{print $2}')
          
          node -e "const { makeBadge } = require('badge-maker'); const fs=require('fs'); fs.writeFileSync('assets/badges/ATS.svg', makeBadge({label:'ATS', message:'$ATS_VER', color:'blue'}))"
          node -e "const { makeBadge } = require('badge-maker'); const fs=require('fs'); fs.writeFileSync('assets/badges/ETS2.svg', makeBadge({label:'ETS2', message:'$ETS2_VER', color:'blue'}))"

      - name: Commit updated badges
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/badges/*.svg
          git diff --quiet || git commit -m "Update game version badges [skip ci]"
          git push