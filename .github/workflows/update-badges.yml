name: Generate Version Badges

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install badge-maker
        run: npm install badge-maker

      - name: Read versions
        id: versions
        run: |
          ATS_VER=$(grep 'ats:' versions.yml | awk -F'"' '{print $2}')
          ETS2_VER=$(grep 'ets2:' versions.yml | awk -F'"' '{print $2}')
          echo "ATS_VER=$ATS_VER" >> $GITHUB_ENV
          echo "ETS2_VER=$ETS2_VER" >> $GITHUB_ENV

      - name: Generate badges
        run: |
          mkdir -p badges
          node -e "const { makeBadge } = require('badge-maker'); const fs=require('fs'); fs.writeFileSync('badges/ATS.svg', makeBadge({label:'ATS', message:'$ATS_VER', color:'blue'}))"
          node -e "const { makeBadge } = require('badge-maker'); const fs=require('fs'); fs.writeFileSync('badges/ETS2.svg', makeBadge({label:'ETS2', message:'$ETS2_VER', color:'blue'}))"

      - name: Upload badges as artifact
        uses: actions/upload-artifact@v3
        with:
          name: game-badges
          path: badges/